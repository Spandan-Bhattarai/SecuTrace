# Render Blueprint - One-click deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: secutrace
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: ALIENVAULT_OTX_API_KEY
        sync: false
      - key: IPINFO_API_KEY
        sync: false
      - key: THREATFOX_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
